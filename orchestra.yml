# Beskar GPU workflow job (#65). The node runner clones this repo and runs these
# steps in order on an approved GPU runner image, inside the gVisor sandbox.
#
# Request the GPU at submit time (orchestra.yml v1 has no GPU field of its own):
#
#   POST /api/v1/jobs
#   {
#     "repo_url": "https://github.com/MandalAutomations/beskar-e2e-tests",
#     "repo_ref": "main",
#     "gpu_min_vram_gb": 1
#   }
#
# gpu_min_vram_gb > 0 makes the scheduler lease a GPU and set
# NVIDIA_VISIBLE_DEVICES, so nvidia-smi and torch.cuda see the card. With
# REQUIRE_GPU=1 (below) the Train step fails the job if no GPU is present, so a
# green run proves GPU passthrough end to end.
name: beskar-e2e

env:
  EPOCHS: "3"
  SEED: "42"
  REQUIRE_GPU: "1"
  OUTPUT_DIR: /scratch/workspace/artifacts

steps:
  - name: Show environment
    run: |
      python --version
      nvidia-smi
      python -c "import torch; print('torch', torch.__version__, 'cuda', torch.cuda.is_available(), torch.cuda.get_device_name(0) if torch.cuda.is_available() else '')"
      echo "epochs=$EPOCHS seed=$SEED require_gpu=$REQUIRE_GPU out=$OUTPUT_DIR"

  - name: Install dependencies
    run: pip install --no-cache-dir -r requirements.txt

  - name: Run unit tests
    run: pytest -q

  - name: Train
    run: python trainer.py

  - name: Evaluate
    run: python evaluate.py

  - name: Echo Hello
    run: python3 -c "print('Hello, this is a test!!')"

  - name: Verify artifacts
    run: |
      test -f "$OUTPUT_DIR/model.json"
      test -f "$OUTPUT_DIR/eval.json"
      echo "artifacts present in $OUTPUT_DIR"
